<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <title>Proposal Studio</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/bip_logo.png">

    <!-- Load design system + chart styles -->
    <link rel="stylesheet" href="/styles/tailwind.css" />
    <link rel="stylesheet" href="/styles/base.css" />
    <link rel="stylesheet" href="/styles/design-system.css" />
    <link rel="stylesheet" href="/styles/modal.css" />
    <link rel="stylesheet" href="/styles/gantt.css" />

    <!-- Page-specific styles -->
    <style>
        html {
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
            text-size-adjust: 100%;
            font-size: 16px;
        }

        body {
            overflow-x: hidden;
            width: 100%;
            position: relative;
        }

        .dropzone-glass:hover .dropzone-content {
             transform: scale(1.03);
        }

        @media screen and (max-width: 640px) {
            html {
                font-size: 14px;
            }
        }

        @media screen and (min-width: 1920px) {
            html {
                font-size: 18px;
            }
        }
    </style>
</head>
<body class="font-sans relative min-h-screen overflow-hidden">

    <!--
      Dynamic Roadmap Background SVG
    -->
    <svg id="roadmap-svg" class="absolute w-full -z-10" preserveAspectRatio="none">
        <!-- Lines will be dynamically added here by JS -->
        <g id="roadmap-lines"></g>
        <!-- Points will be dynamically added here by JS -->
        <g id="roadmap-points"></g>
    </svg>

    <!-- Main container with glassmorphic background -->
    <div class="relative min-h-screen flex flex-col items-center justify-center p-6 md:p-12 bg-glass-gradient">
        <!-- Ambient Background Logo - Glassmorphic treatment -->
        <div class="ambient-logo-container" aria-hidden="true">
            <img src="/bip-background-logo.svg" alt="" class="ambient-logo" />
        </div>

        <!-- Content -->
        <main class="w-full max-w-6xl z-10">
            <!-- Header Text -->
            <!-- Glassmorphic title section - scaled down ~30% -->
            <div class="text-center mb-4" id="title-block">
                <h1 class="text-2xl md:text-3xl font-bold mb-2 title-glass title-glass-animate">
                    Proposal Studio
                </h1>
                <p class="text-sm md:text-base max-w-3xl mx-auto subtitle-glass">
                    Transform research into client-ready presentations, reports, and timelines
                </p>
            </div>

            <!--
              Main Form - Glassmorphic Panel
            -->
            <form id="gantt-form" class="form-glass-panel glass-panel-animate max-w-[600px] mx-auto">
                
                <!-- NEW LOGO HEADER ADDED HERE - scaled down ~30% -->
                <header class="absolute top-0 right-0 p-3 md:p-4 pointer-events-none">
                    <!-- LOGO SIZE scaled down ~30% -->
                    <img src="/bip_logo.png" alt="BIP Logo" class="h-7 w-auto pointer-events-auto">
                </header>

                <!-- Project Instructions Section - scaled down ~30% -->
                <section class="mt-8">
                    <h2 class="text-base md:text-lg font-semibold mb-2">
                        Project Instructions
                    </h2>

                    <!-- Glassmorphic textarea -->
                    <textarea id="prompt-input" rows="4" class="textarea-glass text-xs md:text-sm leading-relaxed"
                              placeholder="Describe your project goals, timeline preferences, key milestones, or any specific requirements for the roadmap generation..."></textarea>
                </section>

                <!-- Upload Section - scaled down ~30% -->
                <section class="mt-5">
                    <h2 class="text-base md:text-lg font-semibold mb-2">
                        Upload Research Documents
                    </h2>

                    <!--
                      File Dropzone - Glassmorphic
                    -->
                    <label for="upload-input" class="dropzone-glass flex flex-col items-center justify-center text-center" tabindex="0" role="button" aria-label="Upload files">

                        <div id="dropzone-prompt" class="flex flex-col items-center justify-center dropzone-content">
                            <!-- Upload Icon with Glass Container -->
                            <div class="upload-icon-container">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.233-2.33 3 3 0 013.758 3.848A3.752 3.752 0 0118 19.5H6.75z" />
                                </svg>
                            </div>

                            <p id="dropzone-title" class="text-[10px] md:text-xs font-medium text-glass-primary">
                                Drop files here or click to browse
                            </p>
                            <p class="text-[11px] text-glass-muted/90 mt-0.5">
                                Supports .docx, .md, .txt, .pdf
                            </p>
                        </div>

                        <!-- Container for file/folder statistics - Glassmorphic -->
                        <div id="file-list-container" class="hidden w-full">
                            <div id="folder-stats" class="hidden mb-6 stats-grid-glass">
                                <div class="stat-card-glass">
                                    <p class="stat-value" id="total-files">0</p>
                                    <p class="stat-label">Total Files</p>
                                </div>
                                <div class="stat-card-glass">
                                    <p class="stat-value text-glass-success" id="valid-files">0</p>
                                    <p class="stat-label">Valid Files</p>
                                </div>
                                <div class="stat-card-glass">
                                    <p class="stat-value" id="total-size">0 MB</p>
                                    <p class="stat-label">Total Size</p>
                                </div>
                                <div class="stat-card-glass">
                                    <p class="stat-value" id="file-types">.md</p>
                                    <p class="stat-label">File Types</p>
                                </div>
                            </div>

                            <p class="text-xs md:text-sm font-semibold mb-1 text-glass-primary">Selected Files:</p>
                            <ul id="file-list" class="file-list-glass list-none text-left">
                                <!-- File names will be injected here by JS -->
                            </ul>
                            <p class="text-[9px] md:text-xs text-glass-muted mt-1 font-light">Click again or drop to change selection</p>
                        </div>
                    </label>

                    <!-- The actual file input, hidden but functional -->
                    <input type="file" id="upload-input" multiple accept=".md, .txt, .docx, application/vnd.openxmlformats-officedocument.wordprocessingml.document" class="hidden">
                </section>

                <!-- Form Actions (Button & Loader) - Glassmorphic - scaled down ~30% -->
                <div class="form-actions mt-5">
                    <div class="flex items-center gap-3">
                        <button type="submit" id="generate-btn" class="button-glass-primary text-xs md:text-sm">
                            Generate Chart
                        </button>

                        <div id="loading-indicator" class="flex items-center gap-2" style="display: none;">
                            <div class="spinner-glass"></div>
                            <span id="loading-text" class="text-xs md:text-sm text-glass-secondary">Generating content (this may take a few minutes)...</span>
                        </div>
                    </div>
                </div>

            </form>
            
            <!-- Error Message Box - scaled down ~30% -->
            <div id="error-message" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg relative my-4 text-sm md:text-base" style="display: none;"></div>

            <!-- Chart will be rendered here -->
            <div id="chart-output" class="w-full">
                <!-- This is where main.js will build the chart -->
            </div>

        </main>
    </div>

    <!-- Dynamic SVG Background Animation -->
    <script src="/roadmap-animation.js"></script>
    
    <!-- Load the main application logic -->
    <script type="module" src="/main.js"></script>
    
</body>
</html>
